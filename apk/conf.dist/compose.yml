---
# NTP settings are not present, as this is a container. For a NTP server,
# the Asustor NAS is able to do it itself.
services:
  pihole:
    container_name: pihole
    image: pihole/pihole:${VERSION:-latest}
    env_file:
      - .env
      - .version
    ports:
      - 53:53/tcp
      - 53:53/udp
      # Uncomment if you are using Pi-hole as your DHCP server
      # - "67:67/udp"
      - ${WEB_HTTP:-0.0.0.0:5010}:80/tcp # HTTP
      - ${WEB_HTTPS:-0.0.0.0:5011}:443/tcp # HTTPS
    volumes:
      - /share/Configuration/pi-hole/etc/pihole/:/etc/pihole/
      - /share/Configuration/pi-hole/etc/dnsmasq.d/:/etc/dnsmasq.d/
    cap_add:
      # Required if you are using Pi-hole as your DHCP server
      # - NET_ADMIN
      # Optional, if Pi-hole should get some more processing time
      - SYS_NICE
    restart: unless-stopped
networks: {}
